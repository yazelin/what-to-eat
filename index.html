<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>今天要吃什麼？</title>
  <meta name="description" content="可愛便當遊戲風的餐點決策轉盤，選擇困難救星。早餐、午晚餐、飲料三分類，點一下交給命運決定，選項可自行編輯。純前端、免安裝，開瀏覽器就能玩。" />
  <link rel="canonical" href="https://craig7351.github.io/what-to-eat/" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="zh_TW" />
  <meta property="og:site_name" content="今天要吃什麼？" />
  <meta property="og:url" content="https://craig7351.github.io/what-to-eat/" />
  <meta property="og:title" content="今天要吃什麼？— 可愛餐點決策轉盤" />
  <meta property="og:description" content="選擇困難救星！早餐、午晚餐、飲料三分類轉盤，點一下交給命運決定，選項可自行編輯。純前端、免安裝，開瀏覽器就能玩。" />
  <meta property="og:image" content="https://craig7351.github.io/what-to-eat/docs/og-image.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:type" content="image/jpeg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="今天要吃什麼？— 可愛餐點決策轉盤" />
  <meta name="twitter:description" content="選擇困難救星！早餐、午晚餐、飲料三分類轉盤，點一下交給命運決定。" />
  <meta name="twitter:image" content="https://craig7351.github.io/what-to-eat/docs/og-image.jpg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 漂浮裝飾 -->
  <img class="deco deco-heart"  src="assets/主頁/愛心.webp" alt="" aria-hidden="true" />
  <img class="deco deco-spark"  src="assets/主頁/閃光.webp" alt="" aria-hidden="true" />
  <img class="deco deco-rice"   src="assets/主頁/飯糰.webp" alt="" aria-hidden="true" />
  <img class="deco deco-toast"  src="assets/主頁/吐司.webp" alt="" aria-hidden="true" />
  <img class="deco deco-soy"    src="assets/主頁/豆漿.webp" alt="" aria-hidden="true" />
  <img class="deco deco-coffee" src="assets/主頁/咖啡.webp" alt="" aria-hidden="true" />

  <!-- 右上角控制列 -->
  <div class="top-controls">
    <a class="fb-btn" href="https://www.facebook.com/people/Book-Ai/61584339789020/"
       target="_blank" rel="noopener noreferrer" title="追蹤 Book Ai 粉絲團">
      <span class="fb-f">f</span>
      <span class="fb-label">粉絲團</span>
    </a>
  </div>

  <main class="app">
    <header class="app-header">
      <div class="title-sticker">
        <span class="title-fork">🍴</span>
        <h1 class="title">今天要吃什麼？</h1>
      </div>
      <p class="subtitle">轉一下，交給命運決定 🍱</p>
    </header>

    <!-- 分類 Tab -->
    <div class="tabs" role="tablist" aria-label="餐點分類">
      <button class="tab is-active" data-category="breakfast" role="tab" aria-selected="true">
        <span class="tab-ico">🌞</span>早餐
      </button>
      <button class="tab" data-category="lunchDinner" role="tab" aria-selected="false">
        <span class="tab-ico">🌙</span>午晚餐
      </button>
      <button class="tab" data-category="drinks" role="tab" aria-selected="false">
        <span class="tab-ico">🧋</span>飲料
      </button>
    </div>

    <div class="stage">
      <!-- 轉盤區 -->
      <section class="wheel-panel">
        <div class="wheel-area">
          <img class="pointer" src="assets/主頁/指針.webp" alt="指針" />
          <svg class="wheel" id="wheel" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" aria-label="餐點轉盤"></svg>
          <!-- 固定中心笑臉（不隨轉盤旋轉） -->
          <div class="hub" id="hub">
            <span class="hub-cheek left"></span>
            <span class="hub-cheek right"></span>
            <span class="hub-eye left"></span>
            <span class="hub-eye right"></span>
            <span class="hub-mouth"></span>
          </div>
          <!-- 中獎時從笑臉噴出的愛心／閃光 -->
          <div class="hub-fx" id="hubFx" aria-hidden="true">
            <img class="fx fx1" src="assets/主頁/愛心.webp" alt="" />
            <img class="fx fx2" src="assets/主頁/閃光.webp" alt="" />
            <img class="fx fx3" src="assets/主頁/愛心.webp" alt="" />
            <img class="fx fx4" src="assets/主頁/閃光.webp" alt="" />
            <img class="fx fx5" src="assets/主頁/愛心.webp" alt="" />
            <img class="fx fx6" src="assets/主頁/閃光.webp" alt="" />
            <img class="fx fx7" src="assets/主頁/愛心.webp" alt="" />
            <img class="fx fx8" src="assets/主頁/閃光.webp" alt="" />
          </div>
        </div>
        <button class="spin-btn" id="spinBtn">幫我決定！</button>
        <button class="edit-btn" id="editBtn">✏️ 編輯菜單</button>
      </section>

      <!-- 結果卡 -->
      <section class="result-panel">
        <div class="result-card" id="resultCard">
          <div class="result-banner" id="resultBanner" hidden>今天早餐吃</div>
          <p class="result-title" id="resultTitle">按一下，讓轉盤幫你決定！</p>
          <div class="result-icon-wrap" id="resultIconWrap" hidden>
            <img class="result-icon" id="resultIcon" src="" alt="" />
          </div>
          <div class="result-divider" id="resultDivider" hidden></div>
          <p class="result-note" id="resultNote" hidden>不用想了，就它了。 <span class="note-heart">💛</span></p>
        </div>
      </section>
    </div>
  </main>

  <!-- 全螢幕彩帶紙屑層（抽中時灑落） -->
  <div class="confetti-layer" id="confettiLayer" aria-hidden="true"></div>

  <!-- 編輯菜單彈窗 -->
  <div class="edit-modal" id="editModal" hidden>
    <div class="edit-backdrop"></div>
    <div class="edit-card" role="dialog" aria-modal="true" aria-labelledby="editTitle">
      <div class="edit-header">
        <h2 class="edit-title" id="editTitle">編輯菜單</h2>
        <button class="edit-close" id="editClose" aria-label="關閉">✕</button>
      </div>

      <div class="edit-list" id="editList"></div>

      <div class="edit-add">
        <div class="edit-add-title">➕ 新增餐點</div>
        <input class="edit-add-name" id="editName" type="text" placeholder="餐點名稱（最多 6 字）" maxlength="6" />
        <div class="edit-add-label">選一個圖示：</div>
        <div class="edit-icons" id="editIcons"></div>
        <button class="edit-add-btn" id="editAddBtn">加入轉盤</button>
      </div>

      <div class="edit-footer">
        <button class="edit-reset" id="editReset">↺ 還原此分類預設</button>
        <button class="edit-done" id="editDone">完成</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
